name: Move Assets

on:
  push:
    branches:
      - android
    paths:
      - 'assets/**'
  workflow_dispatch:

jobs:
  move-assets:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: android
      
      - name: Create target directory structure
        run: mkdir -p webview/assets/html/assets/assets
      
      - name: Copy assets to target location
        run: |
          if [ -d "assets" ] && [ -n "$(ls -A assets)" ]; then
            cp -r assets/* webview/assets/html/assets/assets/
            echo "Assets copied successfully"
          else
            echo "Assets directory is empty or doesn't exist"
          fi
      
      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      
      - name: Commit and push changes
        run: |
          git add webview/assets/html/assets/assets/
          git diff --quiet --cached || (git commit -m "chore: move assets to webview directory" && git push)
