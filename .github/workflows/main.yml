name: Move assets into webview
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  move-assets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create branch from android
        run: |
          git fetch origin android
          git checkout -b move-assets-to-webview origin/android

      - name: Move selected assets and convert lang files
        run: |
          set -e
          mkdir -p webview/assets/html/assets

          # Attempt git mv; if target exists or mv fails, fallback to copy+add
          if [ -d assets/fonts ]; then
            if git mv assets/fonts webview/assets/html/assets/fonts 2>/dev/null; then :; else
              mkdir -p webview/assets/html/assets/fonts
              cp -a assets/fonts/* webview/assets/html/assets/fonts/ || true
              git add webview/assets/html/assets/fonts
            fi
          fi

          if [ -d assets/lang ]; then
            if git mv assets/lang webview/assets/html/assets/lang 2>/dev/null; then :; else
              mkdir -p webview/assets/html/assets/lang
              cp -a assets/lang/* webview/assets/html/assets/lang/ || true
              git add webview/assets/html/assets/lang
            fi
          fi

          if [ -d assets/textures ]; then
            if git mv assets/textures webview/assets/html/assets/textures 2>/dev/null; then :; else
              mkdir -p webview/assets/html/assets/textures
              cp -a assets/textures/* webview/assets/html/assets/textures/ || true
              git add webview/assets/html/assets/textures
            fi
          fi

          if [ -d assets/sounds/granny ]; then
            mkdir -p webview/assets/html/assets/sounds
            if git mv assets/sounds/granny webview/assets/html/assets/sounds/granny 2>/dev/null; then :; else
              mkdir -p webview/assets/html/assets/sounds/granny
              cp -a assets/sounds/granny/* webview/assets/html/assets/sounds/granny/ || true
              git add webview/assets/html/assets/sounds/granny
            fi
          fi

          # Rename .json → .js in new lang dir if present
          if [ -d webview/assets/html/assets/lang ]; then
            if [ -f webview/assets/html/assets/lang/en.json ]; then
              git mv webview/assets/html/assets/lang/en.json webview/assets/html/assets/lang/en.js || true
            fi
            if [ -f webview/assets/html/assets/lang/ja.json ]; then
              git mv webview/assets/html/assets/lang/ja.json webview/assets/html/assets/lang/ja.js || true
            fi
          fi

          # Commit & push
          git add -A
          git commit -m "Move assets into webview/assets/html/assets and convert lang json→js" || echo "No changes to commit"
          git push -u origin move-assets-to-webview

      - name: Print PR URL
        run: |
          echo "Compare / create PR: https://github.com/${{ github.repository }}/compare/android...move-assets-to-webview?expand=1"
