name: Move assets into webview_for_android
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  move-assets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create branch from android
        run: |
          git fetch origin android
          git checkout -b move-assets-to-webview origin/android

      - name: Move everything into webview_for_android and duplicate logo
        run: |
          set -e
          # ensure target base dir (guarantee full nested path)
          mkdir -p webview_for_android/assets/html/assets

          # If there is a webview folder already, rename it safely to webview_for_android (only if target not present)
          if [ -d webview ] && [ ! -d webview_for_android ]; then
            if git mv webview webview_for_android 2>/dev/null; then
              echo "Renamed webview -> webview_for_android (git mv)"
            else
              mkdir -p webview_for_android
              cp -a webview/* webview_for_android/ || true
              git add webview_for_android
            fi
          fi

          # Always ensure nested target path exists
          mkdir -p webview_for_android/assets/html/assets

          # Copy (not move) fonts -> preserve original assets
          if [ -d assets/fonts ]; then
            mkdir -p webview_for_android/assets/html/assets/fonts
            cp -a assets/fonts/. webview_for_android/assets/html/assets/fonts/ || true
            git add webview_for_android/assets/html/assets/fonts
          fi

          # Copy lang
          if [ -d assets/lang ]; then
            mkdir -p webview_for_android/assets/html/assets/lang
            cp -a assets/lang/. webview_for_android/assets/html/assets/lang/ || true
            git add webview_for_android/assets/html/assets/lang
          fi

          # Copy textures
          if [ -d assets/textures ]; then
            mkdir -p webview_for_android/assets/html/assets/textures
            cp -a assets/textures/. webview_for_android/assets/html/assets/textures/ || true
            git add webview_for_android/assets/html/assets/textures
          fi

          # Copy sounds/granny
          if [ -d assets/sounds/granny ]; then
            mkdir -p webview_for_android/assets/html/assets/sounds/granny
            cp -a assets/sounds/granny/. webview_for_android/assets/html/assets/sounds/granny/ || true
            git add webview_for_android/assets/html/assets/sounds/granny
          fi

          # Ensure original logo remains and duplicate it into new location if present
          if [ -f assets/textures/granny_clicker_logo.webp ]; then
            mkdir -p webview_for_android/assets/html/assets/textures
            cp -f assets/textures/granny_clicker_logo.webp webview_for_android/assets/html/assets/textures/granny_clicker_logo.webp || true
            git add webview_for_android/assets/html/assets/textures/granny_clicker_logo.webp || true
          fi

          # Rename .json -> .js in the new lang folder (if present)
          if [ -d webview_for_android/assets/html/assets/lang ]; then
            if [ -f webview_for_android/assets/html/assets/lang/en.json ]; then
              git mv webview_for_android/assets/html/assets/lang/en.json webview_for_android/assets/html/assets/lang/en.js || true
            fi
            if [ -f webview_for_android/assets/html/assets/lang/ja.json ]; then
              git mv webview_for_android/assets/html/assets/lang/ja.json webview_for_android/assets/html/assets/lang/ja.js || true
            fi
          fi

          # Refresh git index
          git add -A

      - name: Commit, merge remote branch (if exists) and push
        run: |
          set -e
          git commit -m "Move assets into webview_for_android/assets/html/assets, duplicate logo, convert lang json→js" || echo "No changes to commit"
          # Avoid non-fast-forward: fetch remote move-assets-to-webview branch and merge if exists
          git fetch origin move-assets-to-webview || true
          git merge --no-edit origin/move-assets-to-webview || true
          git push -u origin move-assets-to-webview --force-with-lease

      - name: Print PR URL
        run: |
          echo "Compare / create PR: https://github.com/${{ github.repository }}/compare/android...move-assets-to-webview?expand=1"
