name: Build Windows EXE (NW.js concat)

on:
  push:
    branches: [windows]
  workflow_dispatch:

env:
  NWJS_VERSION: "v0.70.0"    # ustaw swoją wersję NW.js
  ARCH: "x64"                # poprawiona wartość (x64 lub x86)

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install npm deps (if you have build step)
        run: npm ci

      - name: Create package.nw (zip of project files)
        shell: powershell
        run: |
          Remove-Item -Force -ErrorAction SilentlyContinue .\package.nw
          # include package.json, index.html and web/ folder; exclude big assets if you want them external
          $files = @("package.json","index.html")
          if (Test-Path .\web) {
            Get-ChildItem -Path .\web -Recurse -File | ForEach-Object { $files += $_.FullName }
          }
          Compress-Archive -Path $files -DestinationPath .\package.nw -Force

      - name: Download NW.js runtime
        shell: powershell
        run: |
          $v = "${{ env.NWJS_VERSION }}"
          $arch = "${{ env.ARCH }}"
          # NW.js releases use names like: nwjs-v0.70.0-win-x64.zip
          $url = "https://dl.nwjs.io/$v/nwjs-$v-win-$arch.zip"
          Write-Host "Downloading $url"
          Invoke-WebRequest -Uri $url -OutFile nw.zip
          Expand-Archive -Path nw.zip -DestinationPath nw_runtime -Force

      - name: Build GrannyClicker.exe (concat)
        shell: powershell
        run: |
          # Znajdź rozpakowany folder nwjs-*
          $nwFolder = Get-ChildItem -Path nw_runtime -Directory | Where-Object { $_.Name -like "nwjs-*" } | Select-Object -First 1
          if (-not $nwFolder) { throw "NW.js runtime folder not found in nw_runtime" }
          $nwExe = Join-Path $nwFolder.FullName "nw.exe"
          if (-not (Test-Path $nwExe)) { throw "nw.exe not found at $nwExe" }
          $package = Join-Path $PWD "package.nw"
          if (-not (Test-Path $package)) { throw "package.nw not found at $package" }
          $out = Join-Path $PWD "GrannyClicker.exe"
          # Użyj cmd copy /b do konkatenacji binarnej
          cmd /c "copy /b `"$nwExe`"+`"$package`" `"$out`""
          if (-not (Test-Path $out)) { throw "Output exe not created" }

      - name: Set icon (optional, requires rcedit.exe path or secret)
        if: ${{ secrets.WINDOWS_RCEDIT }}
        shell: powershell
        env:
          WINDOWS_RCEDIT: ${{ secrets.WINDOWS_RCEDIT }}
        run: |
          # oczekuje ścieżki do rcedit.exe w sekrecie WINDOWS_RCEDIT lub możesz trzymać rcedit.exe w repo w ścieżce build\rcedit.exe
          $rcedit = $env:WINDOWS_RCEDIT
          if (-not (Test-Path $rcedit)) { throw "rcedit.exe not found at $rcedit" }
          $exe = Join-Path $PWD "GrannyClicker.exe"
          & $rcedit $exe --set-icon .\build\icon.ico

      - name: Code sign (optional, expects SIGN_PFX secret as base64)
        if: ${{ secrets.SIGN_PFX }}
        shell: powershell
        env:
          SIGN_PFX: ${{ secrets.SIGN_PFX }}
          SIGN_PFX_PASSWORD: ${{ secrets.SIGN_PFX_PASSWORD }}
        run: |
          # Zakładam, że SECRET SIGN_PFX to PFX zakodowane base64 (bezpośrednie binarne nie przeniosłyby się przez YAML dobrze).
          $bytes = [System.Convert]::FromBase64String($env:SIGN_PFX)
          [System.IO.File]::WriteAllBytes("cert.pfx", $bytes)
          $exe = Join-Path $PWD "GrannyClicker.exe"
          if (-not (Test-Path $exe)) { throw "Executable not found for signing: $exe" }
          # signtool musi być dostępny na runnerze (domyślnie jest w Windows-Runner jeśli zainstalowano Windows SDK)
          & signtool sign /f cert.pfx /p $env:SIGN_PFX_PASSWORD /fd SHA256 /tr "http://timestamp.digicert.com" /td SHA256 $exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: GrannyClicker-win
          path: GrannyClicker.exe
