<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Granny Clicker - Main Menu</title>
    <link rel="stylesheet" href="style_title.css">
    <script src="../scripts/core_init.js"></script>
    <script src="../scripts/asset_patcher.js"></script>
    <script src="../scripts/translate.js"></script>
    <script src="script_title.js"></script>
</head>
<body>

    <div id="bg"></div>

    <div id="ui-container">
        <img id="logo" src="../../assets/textures/granny_clicker_logo.webp" alt="Granny Clicker">
        <button class="menu-btn" data-translate="play_button" onclick="startGame()"></button>
    </div>

    <div id="lang-panel" onclick="toggleLangDropdown()">
        <img src="../../assets/textures/ui/options/languages.webp" alt="Language">
        <span data-translate="language_label">Language</span>
        <div id="lang-dropdown">
            <div onclick="selectLanguage('en', event)">English</div>
            <div onclick="selectLanguage('pl', event)">Polski</div>
            <div onclick="selectLanguage('ja', event)">日本語</div>
        </div>
    </div>

    <audio id="menuMusic" src="../../assets/sounds/music/main_menu.mp3" loop></audio>

</body>
</html>
