<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Granny Clicker - Launcher</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #050505;
            color: #cc0000;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        body::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        #console {
            width: 90%;
            max-width: 600px;
            transition: opacity 0.7s ease-in-out;
            max-height: 80vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            z-index: 3;
        }

        .line {
            margin-bottom: 10px;
            font-size: 15px;
            font-weight: bold;
            text-shadow: 0 0 4px #ff0000;
            white-space: nowrap;
            overflow: hidden;
            border-right: 2px solid #cc0000;
            width: fit-content;
            animation: typing 1.5s steps(40, end), blink .75s step-end infinite;
        }

        @keyframes typing { from { width: 0 } to { width: 100% } }
        @keyframes blink { from, to { border-color: transparent } 50% { border-color: #cc0000 } }

        .btn-launch {
            background: #110000;
            border: 2px solid #cc0000;
            color: #cc0000;
            padding: 15px 35px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            margin-top: 30px;
            display: none;
            font-family: 'Courier New', Courier, monospace;
            width: fit-content;
            align-self: center;
            box-shadow: 0 0 10px #550000;
            transition: all 0.3s;
        }

        .btn-launch:hover {
            background: #cc0000;
            color: #000;
            box-shadow: 0 0 20px #ff0000;
        }

        .btn-launch:disabled {
            border-color: #333;
            color: #333;
            background: #000;
            box-shadow: none;
            cursor: wait;
        }

        #vbs-error {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 340px;
            background-color: #f0f0f0;
            border: 1px solid #000;
            box-shadow: 2px 2px 0 #fff inset, -2px -2px 0 #808080 inset;
            padding: 2px;
            z-index: 10000;
            color: #000;
            font-family: "Tahoma", "Arial", sans-serif;
        }

        .error-title {
            background: linear-gradient(90deg, #800000, #b00000);
            color: white;
            padding: 3px 5px;
            font-weight: bold;
            font-size: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .error-content {
            padding: 20px 15px;
            display: flex;
            align-items: center;
            font-size: 12px;
        }

        .error-icon {
            background-color: #990000;
            color: white;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 20px;
            margin-right: 15px;
            flex-shrink: 0;
            box-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }

        .error-btn {
            width: 80px;
            margin: 0 auto 10px auto;
            display: block;
            border: 1px solid #000;
            background: #e1e1e1;
            padding: 4px;
            box-shadow: 1px 1px 0 #fff inset, 1px 1px 2px rgba(0,0,0,0.3);
            cursor: pointer;
            font-size: 12px;
            text-align: center;
        }
    </style>
</head>
<body>

    <div id="console">
        <div id="logs"></div>
        <button id="launchBtn" class="btn-launch" onclick="checkAndLaunch()">ENTER THE HOUSE</button>
    </div>

    <div id="vbs-error">
        <div class="error-title">
            <span>Granny Clicker - System Error: G-01</span>
            <span style="cursor:pointer" onclick="location.reload()">[X]</span>
        </div>
        <div class="error-content">
            <div class="error-icon">X</div>
            <div>Critical Error: 'title.html' not found in web/title/<br><br>Make sure the game files are complete.</div>
        </div>
        <button class="error-btn" onclick="location.reload()">OK</button>
    </div>

    <script>
        const logs = [
            "> GENERATING WORLD...",
            "> FRONT DOOR: LOCKED WITH 5 LOCKS",
            "> FLOOR CHECK: CREAKY BOARDS DETECTED",
            "> LOCATING GRANNY...",
            "> SHE HEARS YOU.",
            "> SHE SEES YOU.",
            "> DAY 1...",
            "> MAIN MENU: READY TO SPAWN."
        ];
        let currentLine = 0;

        function printLog() {
            if (currentLine < logs.length) {
                let div = document.createElement('div');
                div.className = 'line';
                div.innerText = logs[currentLine];
                document.getElementById('logs').appendChild(div);
                currentLine++;
                setTimeout(printLog, 500);
            } else {
                document.getElementById('launchBtn').style.display = 'inline-block';
            }
        }

        async function checkAndLaunch() {
            const launchBtn = document.getElementById('launchBtn');
            const consoleDiv = document.getElementById('console');
            const errorDiv = document.getElementById('vbs-error');
            
            launchBtn.innerText = "SEARCHING REPOSITORY...";
            launchBtn.disabled = true;

            try {
                const response = await fetch('web/title/title.html', { method: 'HEAD' });

                if (response.ok) {
                    consoleDiv.style.opacity = '0';
                    setTimeout(() => {
                        window.location.href = 'web/title/title.html';
                    }, 500);
                } else {
                    throw new Error();
                }
            } catch (e) {
                setTimeout(() => {
                    consoleDiv.style.opacity = '0.1';
                    errorDiv.style.display = 'block';
                }, 1000);
            }
        }

        window.onload = printLog;
    </script>
</body>
</html>
